<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hex Game (Maximized Board & Dijkstra AI)</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #111827 0%, #374151 100%);
            background-attachment: fixed;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #e5e7eb;
            overflow-x: hidden;
        }
        h1 {
            color: #f9fafb;
            margin-top: 5px;
            margin-bottom: 5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            font-size: 1.6rem;
            letter-spacing: 2px;
        }
        canvas {
            background-color: rgba(17, 24, 39, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 8px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            margin: 5px auto;
            transition: background-color 0.5s ease;
            
            /* スマホの横幅ギリギリまで拡大させる設定 */
            width: 98vw;
            max-width: 900px; /* PC閲覧時の極端な巨大化を防ぐ */
            height: auto;
            max-height: 75vh;
            object-fit: contain;
            
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }
        .glass-panel {
            background: rgba(31, 41, 55, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 16px 0 rgba(0, 0, 0, 0.3);
            border-radius: 8px;
        }
        #status {
            font-size: 16px;
            font-weight: bold;
            margin: 5px 0;
            padding: 8px 16px;
            display: inline-block;
            transition: all 0.3s ease;
        }
        .red-turn {
            color: #ff6b6b;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
        }
        .blue-turn {
            color: #4dabf7;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
        }
        .winner-text {
            font-size: 20px !important;
            padding: 12px 24px !important;
            background: rgba(255, 215, 0, 0.2) !important;
            color: #ffd700 !important;
            border: 2px solid #ffd700;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 20px 10px rgba(255, 215, 0, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 215, 0, 0); }
        }
        .controls {
            display: flex;
            gap: 8px;
            margin-top: 5px;
            flex-wrap: wrap;
            justify-content: center;
        }
        button {
            font-size: 13px;
            font-weight: bold;
            padding: 8px 16px;
            cursor: pointer;
            background: rgba(55, 65, 81, 0.8);
            color: #e5e7eb;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }
        button:hover {
            background: rgba(75, 85, 99, 1);
            transform: translateY(-2px);
        }
        button:active {
            transform: translateY(1px);
        }
        .active-mode {
            background: rgba(16, 185, 129, 0.7); 
            border-color: rgba(16, 185, 129, 1);
            color: white;
        }
        .active-mode:hover {
            background: rgba(16, 185, 129, 0.9);
        }
        .instructions {
            margin-top: 10px;
            margin-bottom: 10px;
            color: #d1d5db;
            font-size: 12px;
            padding: 8px 12px;
            max-width: 95vw;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <h1>Hex</h1>
    <div id="status" class="glass-panel red-turn">赤の番です</div>
    
    <canvas id="hexCanvas"></canvas>
    
    <div class="controls">
        <button id="btn1P" class="active-mode" onclick="setMode('1P')">1人プレイ (vs AI)</button>
        <button id="btn2P" onclick="setMode('2P')">2人プレイ</button>
        <button onclick="resetGame()">リセット</button>
    </div>

    <div class="instructions glass-panel">
        <p><strong>ルール:</strong> 先手（赤）は「上下」、後手（青）は「左右」を繋ぎます。</p>
    </div>

    <script>
        const canvas = document.getElementById('hexCanvas');
        const ctx = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');
        const btn1P = document.getElementById('btn1P');
        const btn2P = document.getElementById('btn2P');

        const BOARD_SIZE = 11;
        // 六角形の描画サイズを劇的に大きく設定（内部解像度を高める）
        const HEX_SIZE = 48; 
        
        // 余白を極限まで削ぎ落とし、盤面全体がぴったり収まるキャンバスサイズを自動計算
        const canvasWidth = Math.sqrt(3) * HEX_SIZE * (BOARD_SIZE + (BOARD_SIZE - 1) / 2) + (HEX_SIZE * Math.sqrt(3)) + 10;
        const canvasHeight = (HEX_SIZE * 3 / 2 * (BOARD_SIZE - 1)) + (HEX_SIZE * 3) + 10;
        
        canvas.width = canvasWidth;
        canvas.height = canvasHeight;

        // キャンバスの左上からギリギリの位置から描画を始めるためのオフセット
        const OFFSET_X = HEX_SIZE * Math.sqrt(3) / 2 + 5;
        const OFFSET_Y = HEX_SIZE + 5;

        let board = [];
        let currentPlayer = 1; 
        let gameOver = false;
        let winningPath = [];
        let gameMode = '1P'; 
        let aiThinking = false;

        function setMode(mode) {
            gameMode = mode;
            if (mode === '1P') {
                btn1P.classList.add('active-mode');
                btn2P.classList.remove('active-mode');
            } else {
                btn2P.classList.add('active-mode');
                btn1P.classList.remove('active-mode');
            }
            resetGame();
        }

        function initBoard() {
            board = [];
            for (let q = 0; q < BOARD_SIZE; q++) {
                board[q] = [];
                for (let r = 0; r < BOARD_SIZE; r++) {
                    board[q][r] = 0; 
                }
            }
            currentPlayer = 1;
            gameOver = false;
            winningPath = [];
            aiThinking = false;
            
            statusDiv.classList.remove('winner-text');
            canvas.style.backgroundColor = "rgba(17, 24, 39, 0.4)";
            
            updateStatus();
            drawBoard();
        }

        function hexToPixel(q, r) {
            const x = HEX_SIZE * Math.sqrt(3) * (q + r / 2) + OFFSET_X;
            const y = HEX_SIZE * 3 / 2 * r + OFFSET_Y;
            return { x, y };
        }

        function pixelToHex(x, y) {
            const q = (Math.sqrt(3) / 3 * (x - OFFSET_X) - 1 / 3 * (y - OFFSET_Y)) / HEX_SIZE;
            const r = (2 / 3 * (y - OFFSET_Y)) / HEX_SIZE;
            return hexRound(q, r);
        }

        function hexRound(q, r) {
            let s = -q - r;
            let rq = Math.round(q);
            let rr = Math.round(r);
            let rs = Math.round(s);

            const q_diff = Math.abs(rq - q);
            const r_diff = Math.abs(rr - r);
            const s_diff = Math.abs(rs - s);

            if (q_diff > r_diff && q_diff > s_diff) {
                rq = -rr - rs;
            } else if (r_diff > s_diff) {
                rr = -rq - rs;
            }
            return { q: rq, r: rr };
        }

        function drawHexagon(x, y, fillStyle, strokeColor) {
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const angle_rad = Math.PI / 180 * (60 * i - 30);
                const px = x + HEX_SIZE * Math.cos(angle_rad);
                const py = y + HEX_SIZE * Math.sin(angle_rad);
                if (i === 0) {
                    ctx.moveTo(px, py);
                } else {
                    ctx.lineTo(px, py);
                }
            }
            ctx.closePath();

            ctx.fillStyle = fillStyle;
            ctx.fill();
            
            ctx.strokeStyle = strokeColor;
            ctx.lineWidth = 1.5;
            ctx.stroke();
        }

        function drawHighlightBorder(x, y) {
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const angle_rad = Math.PI / 180 * (60 * i - 30);
                const px = x + HEX_SIZE * Math.cos(angle_rad);
                const py = y + HEX_SIZE * Math.sin(angle_rad);
                if (i === 0) {
                    ctx.moveTo(px, py);
                } else {
                    ctx.lineTo(px, py);
                }
            }
            ctx.closePath();
            ctx.strokeStyle = '#FFD700';
            ctx.lineWidth = 7;
            ctx.stroke();
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#FFD700';
            ctx.stroke();
            ctx.shadowBlur = 0; 
        }

        function drawTileEdges(x, y, edgeIndices, strokeColor) {
            ctx.lineWidth = 10;
            ctx.strokeStyle = strokeColor;
            ctx.lineCap = "round";

            const corners = [];
            for (let i = 0; i < 6; i++) {
                const angle_rad = Math.PI / 180 * (60 * i - 30);
                corners.push({
                    x: x + HEX_SIZE * Math.cos(angle_rad),
                    y: y + HEX_SIZE * Math.sin(angle_rad)
                });
            }

            edgeIndices.forEach(edgeIndex => {
                ctx.beginPath();
                const startCorner = corners[edgeIndex];
                const endCorner = corners[(edgeIndex + 1) % 6];
                ctx.moveTo(startCorner.x, startCorner.y);
                ctx.lineTo(endCorner.x, endCorner.y);
                ctx.stroke();
            });
        }

        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let q = 0; q < BOARD_SIZE; q++) {
                for (let r = 0; r < BOARD_SIZE; r++) {
                    const { x, y } = hexToPixel(q, r);
                    const state = board[q][r];

                    let isWinningNode = false;
                    if (gameOver) {
                        isWinningNode = winningPath.some(node => node.q === q && node.r === r);
                        ctx.globalAlpha = isWinningNode ? 1.0 : 0.2;
                    } else {
                        ctx.globalAlpha = 1.0;
                    }

                    if (state === 0) {
                        drawHexagon(x, y, 'rgba(255, 255, 255, 0.05)', 'rgba(255, 255, 255, 0.15)');
                    } else if (state === 1) {
                        drawHexagon(x, y, '#e63946', '#b30000');
                    } else if (state === 2) {
                        drawHexagon(x, y, '#4dabf7', '#004080');
                    }

                    if (gameOver && isWinningNode) {
                        drawHighlightBorder(x, y);
                    }

                    const redBorders = [];
                    const blueBorders = [];
                    const redColor = 'rgba(255, 50, 50, 0.8)';
                    const blueColor = 'rgba(50, 150, 255, 0.8)';

                    if (r === 0) redBorders.push(4, 5); 
                    else if (r === BOARD_SIZE - 1) redBorders.push(1, 2); 

                    if (q === 0) {
                        blueBorders.push(3); 
                        if (r !== BOARD_SIZE - 1) blueBorders.push(2); 
                    } else if (q === BOARD_SIZE - 1) {
                        blueBorders.push(0); 
                        if (r !== 0) blueBorders.push(5); 
                    }

                    if (redBorders.length > 0) drawTileEdges(x, y, redBorders, redColor);
                    if (blueBorders.length > 0) drawTileEdges(x, y, blueBorders, blueColor);
                }
            }
            ctx.globalAlpha = 1.0;
        }

        function getNeighbors(q, r) {
            return [
                { q: q + 1, r: r },
                { q: q, r: r + 1 },
                { q: q - 1, r: r + 1 },
                { q: q - 1, r: r },
                { q: q, r: r - 1 },
                { q: q + 1, r: r - 1 }
            ].filter(n => n.q >= 0 && n.q < BOARD_SIZE && n.r >= 0 && n.r < BOARD_SIZE);
        }

        function getWinningPath(player) {
            const visited = new Set();
            const queue = [];
            const parent = new Map(); 

            if (player === 1) { 
                for (let q = 0; q < BOARD_SIZE; q++) {
                    if (board[q][0] === 1) {
                        queue.push({ q: q, r: 0 });
                        visited.add(`${q},0`);
                    }
                }
            } else { 
                for (let r = 0; r < BOARD_SIZE; r++) {
                    if (board[0][r] === 2) {
                        queue.push({ q: 0, r: r });
                        visited.add(`0,${r}`);
                    }
                }
            }

            while (queue.length > 0) {
                const current = queue.shift();
                const key = `${current.q},${current.r}`;

                if ((player === 1 && current.r === BOARD_SIZE - 1) || 
                    (player === 2 && current.q === BOARD_SIZE - 1)) {
                    
                    const path = [];
                    let currNode = current;
                    let currKey = key;
                    
                    while (currNode) {
                        path.push(currNode);
                        const pKey = parent.get(currKey);
                        if (!pKey) break;
                        const [pq, pr] = pKey.split(',').map(Number);
                        currNode = { q: pq, r: pr };
                        currKey = pKey;
                    }
                    return path; 
                }

                const neighbors = getNeighbors(current.q, current.r);
                for (let n of neighbors) {
                    const nKey = `${n.q},${n.r}`;
                    if (board[n.q][n.r] === player && !visited.has(nKey)) {
                        visited.add(nKey);
                        parent.set(nKey, key); 
                        queue.push(n);
                    }
                }
            }
            return null; 
        }

        function updateStatus() {
            if (gameOver) return;
            if (currentPlayer === 1) {
                statusDiv.textContent = "赤の番です";
                statusDiv.className = "glass-panel red-turn";
            } else {
                statusDiv.textContent = aiThinking ? "AIが経路を計算中..." : "青の番です";
                statusDiv.className = "glass-panel blue-turn";
            }
        }

        function placeStone(q, r, player) {
            board[q][r] = player;
            const path = getWinningPath(player);
            
            if (path) {
                gameOver = true;
                winningPath = path;
                canvas.style.backgroundColor = "rgba(0, 0, 0, 0.6)"; 
                
                if (player === 1) {
                    statusDiv.textContent = "赤の勝利！！";
                    statusDiv.className = "glass-panel red-turn winner-text";
                } else {
                    statusDiv.textContent = "青の勝利！！";
                    statusDiv.className = "glass-panel blue-turn winner-text";
                }
            } else {
                currentPlayer = player === 1 ? 2 : 1;
                updateStatus();
                
                if (gameMode === '1P' && currentPlayer === 2 && !gameOver) {
                    aiThinking = true;
                    updateStatus();
                    setTimeout(aiMove, 50); 
                }
            }
            drawBoard(); 
        }

        // ==========================================
        // 激辛AIロジック（ダイクストラ / 0-1 BFS 最短経路探索）
        // ==========================================

        function getDistances(player, border) {
            let dist = new Int32Array(BOARD_SIZE * BOARD_SIZE).fill(9999);
            let deque = [];

            if (player === 1) { 
                if (border === 'TOP') {
                    for (let q = 0; q < BOARD_SIZE; q++) {
                        let st = board[q][0];
                        let idx = q * BOARD_SIZE + 0;
                        if (st === 1) { dist[idx] = 0; deque.unshift({q, r: 0}); }
                        else if (st === 0) { dist[idx] = 1; deque.push({q, r: 0}); }
                    }
                } else if (border === 'BOTTOM') {
                    for (let q = 0; q < BOARD_SIZE; q++) {
                        let st = board[q][BOARD_SIZE - 1];
                        let idx = q * BOARD_SIZE + (BOARD_SIZE - 1);
                        if (st === 1) { dist[idx] = 0; deque.unshift({q, r: BOARD_SIZE - 1}); }
                        else if (st === 0) { dist[idx] = 1; deque.push({q, r: BOARD_SIZE - 1}); }
                    }
                }
            } else { 
                if (border === 'LEFT') {
                    for (let r = 0; r < BOARD_SIZE; r++) {
                        let st = board[0][r];
                        let idx = 0 * BOARD_SIZE + r;
                        if (st === 2) { dist[idx] = 0; deque.unshift({q: 0, r}); }
                        else if (st === 0) { dist[idx] = 1; deque.push({q: 0, r}); }
                    }
                } else if (border === 'RIGHT') {
                    for (let r = 0; r < BOARD_SIZE; r++) {
                        let st = board[BOARD_SIZE - 1][r];
                        let idx = (BOARD_SIZE - 1) * BOARD_SIZE + r;
                        if (st === 2) { dist[idx] = 0; deque.unshift({q: BOARD_SIZE - 1, r}); }
                        else if (st === 0) { dist[idx] = 1; deque.push({q: BOARD_SIZE - 1, r}); }
                    }
                }
            }

            while (deque.length > 0) {
                let {q, r} = deque.shift();
                let d = dist[q * BOARD_SIZE + r];

                let neighbors = getNeighbors(q, r);
                for (let n of neighbors) {
                    let st = board[n.q][n.r];
                    if (st === (player === 1 ? 2 : 1)) continue; 
                    
                    let cost = (st === player) ? 0 : 1;
                    let next_dist = d + cost;
                    let nIdx = n.q * BOARD_SIZE + n.r;
                    
                    if (next_dist < dist[nIdx]) {
                        dist[nIdx] = next_dist;
                        if (cost === 0) deque.unshift(n);
                        else deque.push(n);
                    }
                }
            }
            return dist;
        }

        function aiMove() {
            if (gameOver) return;

            let dist_T = getDistances(1, 'TOP');
            let dist_B = getDistances(1, 'BOTTOM');
            let dist_L = getDistances(2, 'LEFT');
            let dist_R = getDistances(2, 'RIGHT');

            let bestScore = -Infinity;
            let bestMoves = [];

            for (let q = 0; q < BOARD_SIZE; q++) {
                for (let r = 0; r < BOARD_SIZE; r++) {
                    if (board[q][r] === 0) {
                        let idx = q * BOARD_SIZE + r;
                        
                        let cost_red = dist_T[idx] + dist_B[idx] - 1;
                        let cost_blue = dist_L[idx] + dist_R[idx] - 1;

                        let score = 0;

                        if (cost_blue === 1) {
                            score += 1000000; 
                        }
                        else if (cost_red === 1) {
                            score += 500000;
                        } 
                        else {
                            score += Math.pow(2, 12 - cost_blue) * 1.5; 
                            score += Math.pow(2, 12 - cost_red) * 1.0;  

                            score += (10 - (Math.abs(q - 5) + Math.abs(r - 5))) * 10;
                        }

                        score += Math.random() * 5;

                        if (score > bestScore) {
                            bestScore = score;
                            bestMoves = [{q, r}];
                        } else if (Math.abs(score - bestScore) < 0.1) {
                            bestMoves.push({q, r});
                        }
                    }
                }
            }

            const move = bestMoves[Math.floor(Math.random() * bestMoves.length)];
            
            aiThinking = false;
            if (move) placeStone(move.q, move.r, 2);
        }
        // ==========================================

        canvas.addEventListener('pointerdown', (event) => {
            if (gameOver) return;
            if (gameMode === '1P' && currentPlayer === 2) return;
            
            event.preventDefault();
            const rect = canvas.getBoundingClientRect();
            
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            const x = (event.clientX - rect.left) * scaleX;
            const y = (event.clientY - rect.top) * scaleY;

            const hex = pixelToHex(x, y);

            if (hex.q >= 0 && hex.q < BOARD_SIZE && hex.r >= 0 && hex.r < BOARD_SIZE) {
                if (board[hex.q][hex.r] === 0) {
                    placeStone(hex.q, hex.r, currentPlayer);
                }
            }
        });

        function resetGame() {
            initBoard();
        }

        initBoard();

    </script>
</body>
</html>
